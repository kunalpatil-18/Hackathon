<!DOCTYPE html>
<html>

<head>
<title>Smart City Traffic Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

.panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
z-index:1000;
}

</style>

</head>

<body>

<div class="panel">
<h3>🚦 Smart City Dashboard</h3>
<p>Traffic + AQI Monitor</p>
<button onclick="loadTraffic()">Refresh Data</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([28.6139,77.2090], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'© OpenStreetMap'
}).addTo(map);

function loadTraffic(){

fetch("http://192.168.137.67:5000/api/status")
.then(res => res.json())
.then(data => {

data.forEach(location => {

var color = "green";

if(location.traffic_density > 60){
color = "red";
}
else if(location.traffic_density > 40){
color = "orange";
}

L.circleMarker(
[28.6139 + Math.random()/100 , 77.2090 + Math.random()/100],
{
radius:10,
color:color,
fillOpacity:0.7
}
)
.addTo(map)
.bindPopup(
"<b>"+location.location+"</b>"+
"<br>Traffic: "+location.traffic_density+
"<br>AQI: "+location.aqi
);

});

});

}

function showAmbulance(){

L.polyline([
[28.6139,77.2090],
[28.6239,77.2190]
],
{color:"blue",weight:6}
).addTo(map)
.bindPopup("🚑 Emergency Corridor");

}
<button onclick="showAmbulance()">Simulate Ambulance</button>

setInterval(loadTraffic,5000)

</script>

</body>

</html>
